# デプロイはVercelのGitHub連携（push/PR自動デプロイ）に任せているため、
# このワークフローは現在 workflow_dispatch（手動実行）のみに限定している。
# 自前のCI/CDパイプラインでデプロイを制御したくなった場合、
# on.push を有効に戻し、下記のBuild/Deployステップを実装すること。
name: CD

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Devbox
        uses: jetify-com/devbox-install-action@v0.13.0
        with:
          enable-cache: true

      # ----------------------------------------------------------------
      # 以下、プロジェクトに合わせてデプロイコマンドを記載してください
      # 例: Vercel / Cloudflare Workers / AWS / GCP / Firebase など
      # ----------------------------------------------------------------

      - name: Build for production
        run: devbox run -- echo "production build command here"

      - name: Deploy
        run: devbox run -- echo "deploy command here"
