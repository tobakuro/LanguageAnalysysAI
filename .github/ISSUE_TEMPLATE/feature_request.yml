name: ✨ 機能要望
description: 新しい機能や改善の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        以下の項目を埋めてください。

  - type: textarea
    id: summary
    attributes:
      label: 機能概要
      description: どのような機能を追加したいですか?
      placeholder: 例) ダークモード切り替え機能を追加したい
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要ですか?どんな課題を解決しますか?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的にどのように実装/動作することを期待しますか?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記載してください
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 補足
      description: モックアップ・参考リンクなど
